network:
  8080/tcp: "Direct access to the web UI — optional (Ingress sidebar is the default)."
  7007/tcp: "Dozzle agent port — map this only when 'Built-in agent' option is enabled."

configuration:
  log_level:
    name: Log level
    description: Verbosity of the Dozzle process in the add-on logs.
  filter:
    name: Docker filter
    description: Optional Docker filter (same syntax as docker ps --filter).
  no_analytics:
    name: Disable anonymous analytics
    description: Do not send usage data to Dozzle.
  enable_actions:
    name: Container actions
    description: Allow restart/stop from the UI (use with care).
  enable_agent:
    name: "Built-in agent (expose HA to remote Dozzle)"
    description: >
      Starts a Dozzle agent on port 7007 so that another Dozzle instance
      running on a different host can connect here and display HA containers.
      This is the OUTGOING direction: map port 7007 in the Network tab to
      make it reachable from outside. You do NOT need this to see HA containers
      in this add-on — they are always visible via the Docker socket.
  remote_agents:
    name: "Remote agents (other hosts → this Dozzle)"
    description: >
      Comma-separated host:port list of Dozzle agents running on OTHER hosts
      whose containers you want to see here (e.g. 192.168.1.10:7007).
      Leave empty to monitor only this HA host.
