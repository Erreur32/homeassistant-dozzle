# Generated at container startup by /etc/services.d/nginx/run
# __INGRESS_BASE__ is replaced with bashio::addon.ingress_entry (e.g. /api/hassio_ingress/TOKEN)
#
# Why the rewrite?
#   HA Supervisor STRIPS /api/hassio_ingress/TOKEN before forwarding to the container.
#   Dozzle runs with --base __INGRESS_BASE__ so it embeds the full token path in all
#   asset URLs. We add the prefix back here so Dozzle receives the paths it expects.

server {
    listen 8080;
    server_name _;
    access_log off;

    location / {
        rewrite ^(.*)$ __INGRESS_BASE__$1 break;
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Prevent Dozzle from gzip-compressing SSE streams.
        # Dozzle checks Accept-Encoding and wraps text/event-stream in gzip
        # when the client advertises support. The HA Supervisor proxy (aiohttp
        # with auto_decompress) then tries to decompress the infinite SSE
        # stream incrementally, which buffers chunks and breaks real-time
        # delivery of log events and alert notifications.
        proxy_set_header   Accept-Encoding "";

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
